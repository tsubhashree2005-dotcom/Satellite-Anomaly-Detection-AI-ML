<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Clean State Diagram (Artifacts Removed)</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#1a1a2e;color:#eee}
.container{display:flex;height:100vh}
.sidebar{width:280px;padding:15px;background:#16213e;overflow-y:auto}
.main{flex:1} svg{width:100%;height:100%}
h2{color:#50C878;margin:0 0 10px;font-size:16px}
.node{cursor:pointer} .node:hover{filter:brightness(1.3)}
.edge{stroke-opacity:0.5} .edge.highlighted{stroke-opacity:1}
.node-label{font-size:8px;fill:#ccc;pointer-events:none}
.info-panel{margin-top:15px;padding:10px;background:#1a1a2e;border-radius:6px;font-size:11px}
.filter-btn{padding:4px 10px;margin:2px;border:1px solid #555;border-radius:4px;background:#0f3460;color:#eee;cursor:pointer;font-size:12px}
.filter-btn.active{background:#50C878;border-color:#50C878}
</style></head><body>
<div class="container">
<div class="sidebar">
<h2>Clean State Diagram</h2>
<div style="font-size:11px;color:#aaa;margin-bottom:10px">Orbital artifacts removed. 0 genuine effects shown.</div>
<div>
<button class="filter-btn active" onclick="toggleFilter('all')">ALL</button>
<button class="filter-btn" onclick="toggleFilter('BDH')">BDH</button>
<button class="filter-btn" onclick="toggleFilter('AOC')">AOC</button>
<button class="filter-btn" onclick="toggleFilter('POW')">POW</button>
<button class="filter-btn" onclick="toggleFilter('THR')">THR</button>
</div>
<div style="margin-top:10px;font-size:11px"><div style="color:#50C878">--- Increase</div><div style="color:#E74C3C">--- Decrease</div><div style="color:#fff;opacity:0.4">- - Discovery (no rule)</div></div>
<div class="info-panel" id="info">Click a node to see connections.</div>
</div>
<div class="main"><svg id="graph"></svg></div>
</div>
<script>
const NODES=[{"id": "p_BDH-M_POS_3.3V_MON", "label": "BDH-M_POS_3.3V_MON", "type": "param", "subsystem": "UNK", "color": "#888", "full_name": "BDH-M_POS_3.3V_MON"}, {"id": "p_BDH-M_POS_5V_MON", "label": "BDH-M_POS_5V_MON", "type": "param", "subsystem": "UNK", "color": "#888", "full_name": "BDH-M_POS_5V_MON"}, {"id": "p_BDH-R_POS_3.3V_MON", "label": "BDH-R_POS_3.3V_MON", "type": "param", "subsystem": "UNK", "color": "#888", "full_name": "BDH-R_POS_3.3V_MON"}, {"id": "p_BDH-R_POS_5V_MON", "label": "BDH-R_POS_5V_MON", "type": "param", "subsystem": "UNK", "color": "#888", "full_name": "BDH-R_POS_5V_MON"}, {"id": "c_HTR-041_EP-01_XPC_SINK_HTR-OFF", "label": "HTR-041_EP-01_XPC_", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "HTR-041_EP-01_XPC_SINK_HTR-OFF"}, {"id": "c_HTR-041_EP-01_XPC_SINK_HTR-ON", "label": "HTR-041_EP-01_XPC_", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "HTR-041_EP-01_XPC_SINK_HTR-ON"}, {"id": "c_HTR-233_EP-01_XBS_SINK_HTR-OFF", "label": "HTR-233_EP-01_XBS_", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "HTR-233_EP-01_XBS_SINK_HTR-OFF"}, {"id": "c_HTR-233_EP-01_XBS_SINK_HTR-ON", "label": "HTR-233_EP-01_XBS_", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "HTR-233_EP-01_XBS_SINK_HTR-ON"}, {"id": "c_SSPA_M_DC-DC-1_OFF", "label": "SSPA_M_DC-DC-1_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-1_OFF"}, {"id": "c_SSPA_M_DC-DC-1_ON", "label": "SSPA_M_DC-DC-1_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-1_ON"}, {"id": "c_SSPA_M_DC-DC-2_OFF", "label": "SSPA_M_DC-DC-2_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-2_OFF"}, {"id": "c_SSPA_M_DC-DC-2_ON", "label": "SSPA_M_DC-DC-2_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-2_ON"}, {"id": "c_SSPA_M_DC-DC-3_OFF", "label": "SSPA_M_DC-DC-3_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-3_OFF"}, {"id": "c_SSPA_M_DC-DC-3_ON", "label": "SSPA_M_DC-DC-3_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-3_ON"}, {"id": "c_SSPA_M_DC-DC-4_OFF", "label": "SSPA_M_DC-DC-4_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-4_OFF"}, {"id": "c_SSPA_M_DC-DC-4_ON", "label": "SSPA_M_DC-DC-4_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_DC-DC-4_ON"}, {"id": "c_SSPA_M_RLY-1_DESEL", "label": "SSPA_M_RLY-1_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-1_DESEL"}, {"id": "c_SSPA_M_RLY-1_SEL", "label": "SSPA_M_RLY-1_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-1_SEL"}, {"id": "c_SSPA_M_RLY-2_DESEL", "label": "SSPA_M_RLY-2_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-2_DESEL"}, {"id": "c_SSPA_M_RLY-2_SEL", "label": "SSPA_M_RLY-2_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-2_SEL"}, {"id": "c_SSPA_M_RLY-3_DESEL", "label": "SSPA_M_RLY-3_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-3_DESEL"}, {"id": "c_SSPA_M_RLY-3_SEL", "label": "SSPA_M_RLY-3_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-3_SEL"}, {"id": "c_SSPA_M_RLY-4_DESEL", "label": "SSPA_M_RLY-4_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-4_DESEL"}, {"id": "c_SSPA_M_RLY-4_SEL", "label": "SSPA_M_RLY-4_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_M_RLY-4_SEL"}, {"id": "c_SSPA_R_DC-DC-1_OFF", "label": "SSPA_R_DC-DC-1_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-1_OFF"}, {"id": "c_SSPA_R_DC-DC-1_ON", "label": "SSPA_R_DC-DC-1_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-1_ON"}, {"id": "c_SSPA_R_DC-DC-2_OFF", "label": "SSPA_R_DC-DC-2_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-2_OFF"}, {"id": "c_SSPA_R_DC-DC-2_ON", "label": "SSPA_R_DC-DC-2_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-2_ON"}, {"id": "c_SSPA_R_DC-DC-3_OFF", "label": "SSPA_R_DC-DC-3_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-3_OFF"}, {"id": "c_SSPA_R_DC-DC-3_ON", "label": "SSPA_R_DC-DC-3_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-3_ON"}, {"id": "c_SSPA_R_DC-DC-4_OFF", "label": "SSPA_R_DC-DC-4_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-4_OFF"}, {"id": "c_SSPA_R_DC-DC-4_ON", "label": "SSPA_R_DC-DC-4_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_DC-DC-4_ON"}, {"id": "c_SSPA_R_RLY-1_DESEL", "label": "SSPA_R_RLY-1_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-1_DESEL"}, {"id": "c_SSPA_R_RLY-1_SEL", "label": "SSPA_R_RLY-1_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-1_SEL"}, {"id": "c_SSPA_R_RLY-2_DESEL", "label": "SSPA_R_RLY-2_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-2_DESEL"}, {"id": "c_SSPA_R_RLY-2_SEL", "label": "SSPA_R_RLY-2_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-2_SEL"}, {"id": "c_SSPA_R_RLY-3_DESEL", "label": "SSPA_R_RLY-3_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-3_DESEL"}, {"id": "c_SSPA_R_RLY-3_SEL", "label": "SSPA_R_RLY-3_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-3_SEL"}, {"id": "c_SSPA_R_RLY-4_DESEL", "label": "SSPA_R_RLY-4_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-4_DESEL"}, {"id": "c_SSPA_R_RLY-4_SEL", "label": "SSPA_R_RLY-4_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "SSPA_R_RLY-4_SEL"}, {"id": "c_XBS-1_M_DESEL", "label": "XBS-1_M_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_M_DESEL"}, {"id": "c_XBS-1_M_OFF", "label": "XBS-1_M_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_M_OFF"}, {"id": "c_XBS-1_M_ON", "label": "XBS-1_M_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_M_ON"}, {"id": "c_XBS-1_M_SEL_R_DESEL", "label": "XBS-1_M_SEL_R_DESE", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_M_SEL_R_DESEL"}, {"id": "c_XBS-1_R_DESEL", "label": "XBS-1_R_DESEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_R_DESEL"}, {"id": "c_XBS-1_R_OFF", "label": "XBS-1_R_OFF", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_R_OFF"}, {"id": "c_XBS-1_R_ON", "label": "XBS-1_R_ON", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_R_ON"}, {"id": "c_XBS-1_R_SEL_M_DESEL", "label": "XBS-1_R_SEL_M_DESE", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XBS-1_R_SEL_M_DESEL"}, {"id": "c_XSW-2_POS-1_SEL", "label": "XSW-2_POS-1_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XSW-2_POS-1_SEL"}, {"id": "c_XSW-2_POS-2_SEL", "label": "XSW-2_POS-2_SEL", "type": "cmd", "subsystem": "UNK", "color": "#888", "full_name": "XSW-2_POS-2_SEL"}];
const EDGES=[];
const svg=document.getElementById("graph");
const W=svg.clientWidth||1200,H=svg.clientHeight||800;
svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
const subs=["BDH","AOC","POW","THR","UNK"];
const cmdN=NODES.filter(n=>n.type==="cmd"),parN=NODES.filter(n=>n.type==="param");
let cy=30;subs.forEach(s=>{const c=cmdN.filter(n=>n.subsystem===s);c.forEach(n=>{n.x=120;n.y=cy;cy+=22});if(c.length>0)cy+=10});
let py=30;subs.forEach(s=>{const p=parN.filter(n=>n.subsystem===s);p.forEach(n=>{n.x=W-150;n.y=py;py+=18});if(p.length>0)py+=8});
const mY=Math.max(cy,py);if(mY>H-40){const sc=(H-40)/mY;NODES.forEach(n=>{if(n.y)n.y=20+n.y*sc})}
const nM={};NODES.forEach(n=>nM[n.id]=n);
EDGES.forEach(e=>{const s=nM[e.source],t=nM[e.target];if(!s||!t)return;
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",s.x);l.setAttribute("y1",s.y);l.setAttribute("x2",t.x);l.setAttribute("y2",t.y);
l.setAttribute("class","edge");l.setAttribute("data-source",e.source);l.setAttribute("data-target",e.target);
const c=e.direction==="increase"?"#50C878":"#E74C3C";
l.setAttribute("stroke",e.has_rule?c:"#ffffff");
l.setAttribute("stroke-width",Math.min(Math.max(e.magnitude*0.5,0.5),4));
if(!e.has_rule)l.setAttribute("stroke-dasharray","4,3");svg.appendChild(l)});
NODES.forEach(n=>{if(!n.x)return;
const g=document.createElementNS("http://www.w3.org/2000/svg","g");
g.setAttribute("class","node");g.setAttribute("data-id",n.id);g.setAttribute("data-sub",n.subsystem);
if(n.type==="cmd"){const r=document.createElementNS("http://www.w3.org/2000/svg","polygon");
const s=7;r.setAttribute("points",`${n.x},${n.y-s} ${n.x+s},${n.y} ${n.x},${n.y+s} ${n.x-s},${n.y}`);
r.setAttribute("fill",n.color);r.setAttribute("stroke","#fff");r.setAttribute("stroke-width","0.5");g.appendChild(r)}
else{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",n.x);c.setAttribute("cy",n.y);c.setAttribute("r",5);
c.setAttribute("fill",n.color);c.setAttribute("stroke","#fff");c.setAttribute("stroke-width","0.5");g.appendChild(c)}
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",n.type==="cmd"?n.x-90:n.x+10);t.setAttribute("y",n.y+3);
t.setAttribute("class","node-label");t.setAttribute("text-anchor",n.type==="cmd"?"end":"start");
t.textContent=n.label;g.appendChild(t);
g.addEventListener("click",()=>highlightNode(n.id));svg.appendChild(g)});
function highlightNode(id){
document.querySelectorAll(".edge").forEach(e=>{e.classList.remove("highlighted");e.style.strokeOpacity=0.1});
document.querySelectorAll(".node").forEach(n=>n.style.opacity=0.3);
document.querySelector(`[data-id="${id}"]`).style.opacity=1;
const connected=new Set();
document.querySelectorAll(".edge").forEach(e=>{
if(e.getAttribute("data-source")===id||e.getAttribute("data-target")===id){
e.classList.add("highlighted");e.style.strokeOpacity=1;
connected.add(e.getAttribute("data-source"));connected.add(e.getAttribute("data-target"))}});
connected.forEach(cid=>{const el=document.querySelector(`[data-id="${cid}"]`);if(el)el.style.opacity=1});
const edges=EDGES.filter(e=>e.source===id||e.target===id);
let info=`<b>${nM[id].full_name}</b><br>[${nM[id].subsystem}]<br><br><b>Connections (${edges.length}):</b><br>`;
edges.forEach(e=>{const o=e.source===id?nM[e.target]:nM[e.source];
if(o)info+=`${e.direction==="increase"?"+":"-"} ${o.full_name} (${e.label})<br>`});
document.getElementById("info").innerHTML=info}
function toggleFilter(sub){
document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
document.querySelectorAll(".node").forEach(n=>{n.style.display=(sub==="all"||n.getAttribute("data-sub")===sub)?"":"none"});
document.querySelectorAll(".edge").forEach(e=>{const s=nM[e.getAttribute("data-source")],t=nM[e.getAttribute("data-target")];
e.style.display=(sub==="all"||(s&&s.subsystem===sub)||(t&&t.subsystem===sub))?"":"none"})}
</script></body></html>
